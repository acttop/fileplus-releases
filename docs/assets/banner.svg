<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
      .display   { font-family: 'Noto Serif KR', serif; }
      .body-kr   { font-family: 'Noto Sans KR', sans-serif; }
      .mono      { font-family: 'IBM Plex Mono', monospace; }
    </style>

    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1F16" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#0F1F16" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0F1F16" stop-opacity="0.35"/>
    </linearGradient>

    <filter id="inkRough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4"/>
    </filter>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0A150F" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#1E3A2B"/>

  <!-- faint ledger grid texture -->
  <g stroke="#F3EEDF" stroke-opacity="0.045" stroke-width="1">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="220" x2="1200" y2="220"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="340" x2="1200" y2="340"/>
    <line x1="0" y1="380" x2="1200" y2="380"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="460" x2="1200" y2="460"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="580" x2="1200" y2="580"/>
  </g>
  <line x1="90" y1="0" x2="90" y2="630" stroke="#F3EEDF" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ================= LEFT CONTENT ================= -->
  <text x="90" y="128" class="mono" font-size="19" fill="#E3A72E" letter-spacing="4">WINDOWS · PORTABLE EXE</text>

  <text x="86" y="235" class="display" font-size="104" font-weight="900" fill="#F3EEDF">FilePlus</text>

  <text x="90" y="292" class="body-kr" font-size="27" font-weight="500" fill="#C7D6C6">쌓여있는 파일, 흩어진 이름들 —</text>
  <text x="90" y="330" class="body-kr" font-size="27" font-weight="500" fill="#C7D6C6">이제 한 화면에서 정리하세요.</text>

  <!-- feature chips -->
  <g class="body-kr" font-size="17" font-weight="700">
    <rect x="90"  y="378" width="122" height="46" rx="23" fill="none" stroke="#E3A72E" stroke-width="1.6"/>
    <text x="151" y="407" fill="#F3EEDF" text-anchor="middle">중복 탐지</text>

    <rect x="224" y="378" width="122" height="46" rx="23" fill="none" stroke="#E3A72E" stroke-width="1.6"/>
    <text x="285" y="407" fill="#F3EEDF" text-anchor="middle">전문 검색</text>

    <rect x="358" y="378" width="122" height="46" rx="23" fill="none" stroke="#E3A72E" stroke-width="1.6"/>
    <text x="419" y="407" fill="#F3EEDF" text-anchor="middle">자동 분류</text>
  </g>

  <!-- attribution -->
  <text x="90" y="560" class="mono" font-size="14" fill="#7F9A85" letter-spacing="1">github.com/acttop/fileplus-releases</text>
  <text x="90" y="583" class="mono" font-size="13" fill="#5E7864" letter-spacing="1">v1.0.0 · SHA-256 · SQLite full-text index</text>

  <!-- ================= RIGHT: FANNED CARD STACK ================= -->
  <!-- pivot at (990,565), cards extend upward, rotated around pivot -->
  <g filter="url(#softShadow)">

    <!-- card template repeated with rotation -->
    <g transform="rotate(-25 990 565)">
      <rect x="905" y="245" width="170" height="112" rx="10" fill="#F3EEDF"/>
      <rect x="905" y="245" width="170" height="24" rx="10" fill="#EFC168"/>
      <rect x="905" y="257" width="170" height="12" fill="#EFC168"/>
      <circle cx="930" cy="300" r="11" fill="none" stroke="#2B2418" stroke-width="2.4"/>
      <line x1="938" y1="308" x2="949" y2="319" stroke="#2B2418" stroke-width="2.6" stroke-linecap="round"/>
      <text x="925" y="338" class="body-kr" font-size="15" font-weight="700" fill="#2B2418">탐색</text>
    </g>

    <g transform="rotate(-15 990 565)">
      <rect x="905" y="245" width="170" height="112" rx="10" fill="#F3EEDF"/>
      <rect x="905" y="245" width="170" height="24" rx="10" fill="#E3A72E"/>
      <rect x="905" y="257" width="170" height="12" fill="#E3A72E"/>
      <path d="M921 293 h20 l7 7 v13 h-27 z" fill="none" stroke="#2B2418" stroke-width="2.2" stroke-linejoin="round"/>
      <circle cx="937" cy="307" r="1.8" fill="#2B2418"/>
      <text x="925" y="338" class="body-kr" font-size="15" font-weight="700" fill="#2B2418">메타</text>
    </g>

    <g transform="rotate(-5 990 565)">
      <rect x="905" y="245" width="170" height="112" rx="10" fill="#F3EEDF"/>
      <rect x="905" y="245" width="170" height="24" rx="10" fill="#EFC168"/>
      <rect x="905" y="257" width="170" height="12" fill="#EFC168"/>
      <line x1="921" y1="295" x2="953" y2="295" stroke="#2B2418" stroke-width="2.2"/>
      <line x1="921" y1="303" x2="953" y2="303" stroke="#2B2418" stroke-width="2.2"/>
      <line x1="921" y1="311" x2="943" y2="311" stroke="#2B2418" stroke-width="2.2"/>
      <text x="925" y="338" class="body-kr" font-size="15" font-weight="700" fill="#2B2418">전문검색</text>
    </g>

    <g transform="rotate(5 990 565)">
      <rect x="905" y="245" width="170" height="112" rx="10" fill="#F3EEDF"/>
      <rect x="905" y="245" width="170" height="24" rx="10" fill="#E3A72E"/>
      <rect x="905" y="257" width="170" height="12" fill="#E3A72E"/>
      <rect x="919" y="292" width="20" height="20" rx="3" fill="none" stroke="#2B2418" stroke-width="2.2"/>
      <rect x="931" y="304" width="20" height="20" rx="3" fill="#F3EEDF" stroke="#2B2418" stroke-width="2.2"/>
      <text x="925" y="338" class="body-kr" font-size="15" font-weight="700" fill="#2B2418">중복</text>
    </g>

    <g transform="rotate(15 990 565)">
      <rect x="905" y="245" width="170" height="112" rx="10" fill="#F3EEDF"/>
      <rect x="905" y="245" width="170" height="24" rx="10" fill="#EFC168"/>
      <rect x="905" y="257" width="170" height="12" fill="#EFC168"/>
      <path d="M919 296 h16 l5 6 h13 v16 h-34 z" fill="none" stroke="#2B2418" stroke-width="2.2" stroke-linejoin="round"/>
      <path d="M958 306 l6 -8" stroke="#2B2418" stroke-width="2.2" stroke-linecap="round"/>
      <text x="925" y="338" class="body-kr" font-size="15" font-weight="700" fill="#2B2418">분류</text>
    </g>

    <g transform="rotate(25 990 565)">
      <rect x="905" y="245" width="170" height="112" rx="10" fill="#F3EEDF"/>
      <rect x="905" y="245" width="170" height="24" rx="10" fill="#E3A72E"/>
      <rect x="905" y="257" width="170" height="12" fill="#E3A72E"/>
      <line x1="922" y1="315" x2="947" y2="290" stroke="#2B2418" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M947 290 l6 6 -6 2 z" fill="#2B2418"/>
      <text x="925" y="338" class="body-kr" font-size="15" font-weight="700" fill="#2B2418">이름변경</text>
    </g>

  </g>

  <!-- ================= INK STAMP SIGNATURE ================= -->
  <g transform="translate(1000 300) rotate(-11)" filter="url(#inkRough)" opacity="0.92">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#A6362A" stroke-width="4"/>
    <circle cx="0" cy="0" r="66" fill="none" stroke="#A6362A" stroke-width="2"/>
    <path id="stampArc" d="M -52,-6 A 52 52 0 0 1 52,-6" fill="none"/>
    <text class="mono" font-size="15" font-weight="600" fill="#A6362A" letter-spacing="5">
      <textPath href="#stampArc" startOffset="50%" text-anchor="middle">FILEPLUS · WINDOWS</textPath>
    </text>
    <text x="0" y="18" text-anchor="middle" class="display" font-size="27" font-weight="900" fill="#A6362A">정리완료</text>
    <text x="0" y="42" text-anchor="middle" class="mono" font-size="12" fill="#A6362A" letter-spacing="2">v 1.0.0</text>
  </g>

  <!-- outer vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>
</svg>
